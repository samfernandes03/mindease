<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindEase — Email Sent</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="../assets/css/background.css">
</head>

<body class="relative min-h-screen bg-white flex justify-center items-center overflow-hidden">

  <div class="sphere sphere-1"></div>
  <div class="sphere sphere-2"></div>

  <div class="w-full max-w-sm px-4 text-center">

    <h1 class="text-3xl font-bold text-gray-900 mb-2">MindEase</h1>

    <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm mt-6">

      <div class="flex justify-center mb-4">
        <!-- Heroicon: Check Circle -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12 text-indigo-600">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75l2.25 2.25L15 9.75m6 2.25a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>

      <h2 class="text-xl font-semibold text-gray-800 mb-2">Email Sent!</h2>

      <p class="text-gray-600 text-sm mb-4">
        If an account exists with that email, you will receive a password reset link shortly.
      </p>

      <button 
        onclick="window.location.href='login.html'"
        class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">
        Back to Login
      </button>

    </div>
  </div>

</body>
</html>
