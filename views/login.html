<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindEase — Login</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="../assets/css/background.css">
  <link rel="stylesheet" href="../assets/css/toasts.css">
</head>

<body class="relative min-h-screen bg-white flex justify-center items-center overflow-hidden">

  <!-- Background spheres -->
  <div class="sphere sphere-1"></div>
  <div class="sphere sphere-2"></div>

  <!-- Toast container -->
  <div class="toast-container"></div>

  <div class="w-full max-w-sm px-4">

    <h1 class="text-3xl font-bold text-center text-gray-900 mb-2">
      MindEase
    </h1>

    <p class="text-[10px] text-center text-gray-500 tracking-[0.25em] mb-8">
      SIGN IN
    </p>

    <form id="loginForm" class="space-y-5">

      <!-- EMAIL -->
      <div>
        <label class="block text-gray-700 mb-1 text-sm font-medium">Email</label>
        <input 
          type="email" 
          id="email"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-400 bg-white"
          required
        >
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block text-gray-700 mb-1 text-sm font-medium">Password</label>

        <div class="relative">
          <input 
            type="password" 
            id="password"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 pr-10 text-sm focus:ring-2 focus:ring-indigo-400 bg-white"
            required
          >

          <button type="button"
            class="absolute inset-y-0 right-3 flex items-center text-gray-500 hover:text-gray-700"
            onclick="togglePassword('password', this)">
            
            <!-- HEROICON: Eye -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>

          </button>
        </div>
      </div>

      <a onclick="window.location.href='recover-password.html'" class="block text-xs text-indigo-600 hover:underline text-center cursor-pointer">
        Forgot your password?
      </a>

      <button 
        class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">
        Login
      </button>

      <button 
        onclick="window.location.href='register.html'"
        type="button"
        class="w-full bg-purple-100 text-purple-700 py-2 rounded-lg text-sm font-semibold hover:bg-purple-200 transition">
        Register
      </button>

    </form>
  </div>

  <script type="module">
    import UserController from "../controllers/UserController.js";
    import { showToast } from "../assets/js/toasts.js";

    document.getElementById("loginForm").addEventListener("submit", e => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password)
        return showToast("Please fill in all fields.", "error");

      if (!email.includes("@"))
        return showToast("Invalid email address.", "error");

      const result = UserController.login(email, password);

      if (!result.success)
        return showToast(result.message, "error");

      showToast("Login successful!", "success");

      // Caminho correto para o dashboard
      setTimeout(() => window.location.href = "dashboard.html", 900);
    });
  </script>

  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      const svg = btn.querySelector("svg");

      const eye = `
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>`;

      const eyeOff = `
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M9.88 9.88A3 3 0 0114.12 14.12M6.18 6.18C3.6 8.4 2.25 12 2.25 12s3.75 7.5 9.75 7.5c2.1 0 3.99-.57 5.61-1.5M17.82 17.82C20.4 15.6 21.75 12 21.75 12s-3.75-7.5-9.75-7.5c-2.1 0-3.99.57-5.61 1.5" />
        </svg>`;

      if (input.type === "password") {
        input.type = "text";
        svg.outerHTML = eyeOff;
      } else {
        input.type = "password";
        svg.outerHTML = eye;
      }
    }
  </script>

</body>
</html>
