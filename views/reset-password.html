<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindEase — Reset Password</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="../assets/css/background.css">
  <link rel="stylesheet" href="../assets/css/toasts.css">
</head>

<body class="relative min-h-screen bg-white flex justify-center items-center overflow-hidden">

  <div class="sphere sphere-1"></div>
  <div class="sphere sphere-2"></div>

  <div class="toast-container"></div>

  <div class="w-full max-w-sm px-4">

    <h1 class="text-3xl font-bold text-center text-gray-900 mb-2">MindEase</h1>
    <p class="text-[10px] text-center text-gray-500 tracking-[0.25em] mb-8">RESET PASSWORD</p>

    <form id="resetForm" class="space-y-5">

      <!-- NEW PASSWORD -->
      <div>
        <label class="block text-gray-700 mb-1 text-sm font-medium">New Password</label>

        <div class="relative">
          <input 
            type="password" 
            id="newPassword"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 pr-10 text-sm focus:ring-2 focus:ring-indigo-400 bg-white"
            required
          >

          <button type="button"
            class="absolute inset-y-0 right-3 flex items-center text-gray-500 hover:text-gray-700"
            onclick="togglePassword('newPassword', this)">
            
            <!-- Eye -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>

          </button>
        </div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div>
        <label class="block text-gray-700 mb-1 text-sm font-medium">Confirm Password</label>

        <div class="relative">
          <input 
            type="password" 
            id="confirmPassword"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 pr-10 text-sm focus:ring-2 focus:ring-indigo-400 bg-white"
            required
          >

          <button type="button"
            class="absolute inset-y-0 right-3 flex items-center text-gray-500 hover:text-gray-700"
            onclick="togglePassword('confirmPassword', this)">
            
            <!-- Eye -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>

          </button>
        </div>
      </div>

      <button 
        class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">
        Save New Password
      </button>

    </form>
  </div>

  <script type="module">
    import { showToast } from "../assets/js/toasts.js";

    // 1. Read token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
      showToast("Invalid reset link.", "error");
      setTimeout(() => window.location.href = "recover-password.html", 1500);
    }

    // 2. Load token data
    const data = JSON.parse(localStorage.getItem("reset_token_" + token));

    if (!data) {
      showToast("Invalid or expired reset link.", "error");
      setTimeout(() => window.location.href = "recover-password.html", 1500);
    }

    // 3. Check expiration
    if (Date.now() > data.expires) {
      showToast("Reset link expired.", "error");
      localStorage.removeItem("reset_token_" + token);
      setTimeout(() => window.location.href = "recover-password.html", 1500);
    }

    // 4. Handle password reset
    document.getElementById("resetForm").addEventListener("submit", e => {
      e.preventDefault();

      const newPassword = document.getElementById("newPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      if (newPassword.length < 6)
        return showToast("Password must be at least 6 characters.", "error");

      if (newPassword !== confirmPassword)
        return showToast("Passwords do not match.", "error");

      // Load users
      const users = JSON.parse(localStorage.getItem("users")) || [];
      const user = users.find(u => u.email === data.email);

      if (!user)
        return showToast("Account not found.", "error");

      // Update password
      user.password = newPassword;
      localStorage.setItem("users", JSON.stringify(users));

      // Destroy token
      localStorage.removeItem("reset_token_" + token);

      showToast("Password updated successfully!", "success");

      setTimeout(() => window.location.href = "login.html", 1200);
    });
  </script>

  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      const svg = btn.querySelector("svg");

      const eye = `
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>`;

      const eyeOff = `
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M9.88 9.88A3 3 0 0114.12 14.12M6.18 6.18C3.6 8.4 2.25 12 2.25 12s3.75 7.5 9.75 7.5c2.1 0 3.99-.57 5.61-1.5M17.82 17.82C20.4 15.6 21.75 12 21.75 12s-3.75-7.5-9.75-7.5c-2.1 0-3.99.57-5.61 1.5" />
        </svg>`;

      if (input.type === "password") {
        input.type = "text";
        svg.outerHTML = eyeOff;
      } else {
        input.type = "password";
        svg.outerHTML = eye;
      }
    }
  </script>

</body>
</html>
