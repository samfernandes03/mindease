    <!-- WELLNESS / ZEN ICON -->

    <!-- FOCUS ICON -->

    <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">

  <!-- MAIN CONTENT -->
  <main class="flex-1 ml-24 p-10">

    <!-- HEADER -->
    <div class="mb-10 flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Task Management</h1>
        <p class="text-gray-500 text-sm">Organize your day with clarity and balance</p>
      </div>

        <button
        onclick="openTaskModal()"
        class="px-4 py-2 bg-indigo-500 hover:bg-indigo-600 text-white font-medium rounded-xl shadow-sm transition"
        >
        + Add Tasks
        </button>
    </div>

    <!-- FILTER BAR -->
    <div class="mb-6 flex flex-wrap gap-4 items-center">

    <select id="sortTasks" class="border rounded-xl px-4 py-2">
        <option value="">Sort By</option>
        <option value="dateAsc">Date — Soonest</option>
        <option value="dateDesc">Date — Latest</option>
        <option value="status">Status (Pending → Done)</option>
        <option value="category">Category (A → Z)</option>
        <option value="priority">Priority (High → Low)</option>
    </select>


    <select id="filterStatus" class="border rounded-xl px-4 py-2">
        <option value="">All Status</option>
        <option value="Pending">Pending</option>
        <option value="Done">Done</option>
    </select>

    <select id="filterCategory" class="border rounded-xl px-4 py-2">
        <option value="">All Categories</option>
    </select>

    <select id="filterEnergy" class="border rounded-xl px-4 py-2">
        <option value="">All Energy</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
    </select>

    <select id="filterMental" class="border rounded-xl px-4 py-2">
        <option value="">All Mental Load</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
    </select>

    <select id="filterDate" class="border rounded-xl px-4 py-2">
        <option value="">All Dates</option>
        <option value="today">Today</option>
        <option value="week">This Week</option>
        <option value="overdue">Overdue</option>
    </select>

    </div>



    <!-- TASK LIST -->
    <div class="space-y-6">


  </main>

    <!-- TASK MODAL (CREATE + EDIT) -->
    <div
    id="taskModal"
    class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50"
    >
    <div class="bg-white w-full max-w-2xl rounded-3xl p-8 shadow-2xl">

        <!-- HEADER -->
        <div class="flex items-center justify-between mb-8">
        <div>
            <h2 id="modalTitle" class="text-2xl font-bold text-gray-900">
            Create New Task
            </h2>
            <p class="text-gray-500 text-sm mt-1">
            Add or edit a task
            </p>
        </div>

        <button
            onclick="closeTaskModal()"
            class="w-10 h-10 rounded-xl hover:bg-gray-100 flex items-center justify-center transition"
        >
            ✕
        </button>
        </div>

        <!-- FORM -->
        <form id="taskForm" class="space-y-6">

        <!-- TITLE -->
        <input
            id="title"
            type="text"
            placeholder="Task Title"
            class="w-full border border-gray-300 rounded-2xl px-4 py-3"
        />

        <!-- CATEGORY -->
        <input
            id="category"
            type="text"
            placeholder="Category"
            class="w-full border border-gray-300 rounded-2xl px-4 py-3"
        />

        <!-- GRID -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

            <select id="mentalLoad" class="w-full border rounded-2xl px-4 py-3">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
            </select>

            <select id="energy" class="w-full border rounded-2xl px-4 py-3">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
            </select>

            <input
            id="dueDate"
            type="date"
            class="w-full border rounded-2xl px-4 py-3"
            />

        </div>

        <!-- FOOTER -->
        <div class="flex justify-end gap-3 pt-4">

            <button
            type="button"
            onclick="closeTaskModal()"
            class="px-5 py-3 rounded-2xl border"
            >
            Cancel
            </button>

            <button
            type="submit"
            class="px-5 py-3 rounded-2xl bg-indigo-500 text-white"
            >
            Save Task
            </button>

        </div>

        </form>

    </div>
    </div>


    <script type="module">
    import { requireAuth } from "../assets/js/authGuard.js";
    import { apiGetAuth, apiPostAuth, apiPutAuth, apiDeleteAuth } from "../assets/js/api.js";
    import { logout } from "../assets/js/logout.js";
    import Task from "../models/Task.js";

    window.logout = logout;
    
    const user = await requireAuth();
    const token = localStorage.getItem("token");

    let tasks = [];
    let editTaskId = null;

    /* -----------------------------
    LOAD TASKS
    ----------------------------- */
    async function loadTasks() {
    const data = await apiGetAuth("/tasks", token);

    tasks = data.map((task) => new Task(task));

    populateCategories();
    renderTasks();
    }

    /* -----------------------------
    POPULATE CATEGORY FILTER
    ----------------------------- */
    function populateCategories() {
    const select = document.getElementById("filterCategory");
    const categories = [...new Set(tasks.map(t => t.category))];

    select.innerHTML = `<option value="">All Categories</option>` +
        categories.map(c => `<option value="${c}">${c}</option>`).join("");
    }

    /* -----------------------------
    RENDER TASKS (with filters)
    ----------------------------- */
    function renderTasks() {
    const container = document.querySelector(".space-y-6");

    // FILTER VALUES
    const statusFilter = document.getElementById("filterStatus").value;
    const categoryFilter = document.getElementById("filterCategory").value;
    const energyFilter = document.getElementById("filterEnergy").value;
    const mentalFilter = document.getElementById("filterMental").value;
    const dateFilter = document.getElementById("filterDate").value;
    const sortValue = document.getElementById("sortTasks").value;

    const today = new Date();

    // APPLY FILTERS
    let filtered = tasks.filter(task => {

        if (statusFilter && task.status !== statusFilter) return false;
        if (categoryFilter && task.category !== categoryFilter) return false;
        if (energyFilter && task.energy !== energyFilter) return false;
        if (mentalFilter && task.mentalLoad !== mentalFilter) return false;

        if (dateFilter === "today") {
        return task.dueDate === today.toISOString().split("T")[0];
        }

        if (dateFilter === "week") {
        const due = new Date(task.dueDate);
        const diff = (due - today) / (1000 * 60 * 60 * 24);
        return diff >= 0 && diff <= 7;
        }

        if (dateFilter === "overdue") {
        return task.isOverdue();
        }

        return true;
    });

    // APPLY SORTING
    if (sortValue === "dateAsc") {
        filtered.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
    }

    if (sortValue === "dateDesc") {
        filtered.sort((a, b) => new Date(b.dueDate) - new Date(a.dueDate));
    }

    if (sortValue === "status") {
        const order = { "Pending": 0, "Done": 1 };
        filtered.sort((a, b) => order[a.status] - order[b.status]);
    }

    if (sortValue === "category") {
        filtered.sort((a, b) => a.category.localeCompare(b.category));
    }

    if (sortValue === "priority") {
        const order = { "High": 0, "Medium": 1, "Low": 2 };
        filtered.sort((a, b) => order[a.mentalLoad] - order[b.mentalLoad]);
    }

    // RENDER
    container.innerHTML = filtered.map(task => `
        <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm 
        ${task.status === 'Done' ? 'opacity-70' : ''}">

        <div class="flex justify-between items-center mb-3">
            <h2 class="text-xl font-semibold text-gray-800 ${task.status === 'Done' ? 'line-through opacity-50' : ''}">
            ${task.title}
            </h2>

            <div class="flex items-center gap-2">

            <button onclick="toggleStatus('${task.id}')"
                class="w-10 h-10 flex items-center justify-center rounded-xl 
                ${task.status === 'Done' ? 'bg-green-200 hover:bg-green-300' : 'bg-gray-200 hover:bg-gray-300'}">
                ${task.status === "Done" ? "✔" : "○"}
            </button>

            <button onclick="openEditModal('${task.id}')"
                class="w-10 h-10 flex items-center justify-center rounded-xl bg-indigo-100 hover:bg-indigo-200">
                ✎
            </button>

            <button onclick="deleteTask('${task.id}')"
                class="w-10 h-10 flex items-center justify-center rounded-xl bg-red-100 hover:bg-red-200">
                🗑
            </button>

            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
            <div><p class="text-gray-500">Category</p><p>${task.category}</p></div>
            <div><p class="text-gray-500">Mental Load</p><p>${task.mentalLoad}</p></div>
            <div><p class="text-gray-500">Energy</p><p>${task.energy}</p></div>
            <div><p class="text-gray-500">Due Date</p><p>${task.dueDate}</p></div>
        </div>

        </div>
    `).join("");
    }


    /* -----------------------------
    DELETE TASK
    ----------------------------- */
    window.deleteTask = async function(id) {
    await apiDeleteAuth(`/tasks/${id}`, token);
    loadTasks();
    };

    /* -----------------------------
    OPEN CREATE MODAL
    ----------------------------- */
    window.openTaskModal = function() {
    editTaskId = null;
    document.getElementById("modalTitle").innerText = "Create New Task";
    document.getElementById("taskForm").reset();
    document.getElementById("taskModal").classList.remove("hidden");
    };

    /* -----------------------------
    OPEN EDIT MODAL
    ----------------------------- */
    window.openEditModal = function(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;

    editTaskId = id;

    document.getElementById("modalTitle").innerText = "Edit Task";

    document.getElementById("title").value = task.title;
    document.getElementById("category").value = task.category;
    document.getElementById("mentalLoad").value = task.mentalLoad;
    document.getElementById("energy").value = task.energy;
    document.getElementById("dueDate").value = task.dueDate;

    document.getElementById("taskModal").classList.remove("hidden");
    };

    /* -----------------------------
    CLOSE MODAL
    ----------------------------- */
    window.closeTaskModal = function() {
    document.getElementById("taskModal").classList.add("hidden");
    editTaskId = null;
    };

    /* -----------------------------
    TOGGLE STATUS
    ----------------------------- */
    window.toggleStatus = async function(id) {
    const task = tasks.find((t) => t.id === id);
    if (!task) return;

    task.toggleStatus();

    await apiPutAuth(`/tasks/${id}`, { status: task.status }, token);
    loadTasks();
    };

    /* -----------------------------
    SUBMIT (CREATE + EDIT)
    ----------------------------- */
    document.getElementById("taskForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const newTask = new Task({
        title: document.getElementById("title").value,
        category: document.getElementById("category").value,
        mentalLoad: document.getElementById("mentalLoad").value,
        energy: document.getElementById("energy").value,
        dueDate: document.getElementById("dueDate").value,
        status: "Pending",
        userId: user.id
    });

    if (editTaskId) {
        await apiPutAuth(`/tasks/${editTaskId}`, {
            title: newTask.title,
            category: newTask.category,
            mentalLoad: newTask.mentalLoad,
            energy: newTask.energy,
            dueDate: newTask.dueDate
        }, token);
    } else {
        await apiPostAuth("/tasks", newTask, token);
    }

    closeTaskModal();
    loadTasks();
    });

    /* -----------------------------
    FILTER LISTENERS
    ----------------------------- */
    document.querySelectorAll("#filterStatus, #filterCategory, #filterEnergy, #filterMental, #filterDate")
    .forEach(el => el.addEventListener("change", renderTasks));

    /* -----------------------------
    INIT
    ----------------------------- */
    loadTasks();

    document.getElementById("sortTasks").addEventListener("change", renderTasks);

    </script>
    
</body>
