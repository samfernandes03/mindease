<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>MindEase — Admin</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="min-h-screen bg-gray-50 flex overflow-y-auto">

  <!-- SIDEBAR -->
  <aside class="w-24 bg-white border-r border-gray-200 flex flex-col items-center py-8 gap-7 fixed h-full">

    <!-- HOME -->
    <a href="./dashboard.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        🏠
      </div>
    </a>

    <!-- TASKS -->
    <a href="./tasks.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        ✅
      </div>
    </a>

    <!-- MOOD -->
    <a href="./mood.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        💜
      </div>
    </a>

    <!-- WELLBEING -->
    <a href="./wellbeing.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        🌿
      </div>
    </a>

    <!-- FOCUS -->
    <a href="./focus.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        🎯
      </div>
    </a>

    <!-- ADMIN -->
    <a href="./admin.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-purple-500 text-white flex items-center justify-center shadow-sm hover:bg-purple-600 transition">
        ⚙️
      </div>
    </a>

    <!-- LOGOUT -->
    <button onclick="logout()" class="group mt-auto mb-4">
      <div class="w-14 h-14 rounded-2xl bg-purple-300 flex items-center justify-center shadow-sm hover:bg-purple-400 transition">
        🚪
      </div>
    </button>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 ml-24 p-10">

    <!-- HEADER -->
    <div class="mb-10">
      <h1 class="text-3xl font-bold text-gray-900">Painel de Administração</h1>
      <p class="text-gray-500 text-sm">Gestão e visão geral da aplicação MindEase</p>
    </div>

    <!-- ACCESS DENIED -->
    <div id="accessDenied" class="hidden bg-red-50 border border-red-200 text-red-700 p-6 rounded-2xl mb-8">
      <h2 class="text-xl font-semibold mb-2">Acesso negado</h2>
      <p>Esta área é exclusiva para administradores.</p>
      <a href="./dashboard.html" class="inline-block mt-4 text-sm font-medium underline">
        Voltar ao dashboard
      </a>
    </div>

    <!-- ADMIN CONTENT -->
    <div id="adminContent" class="hidden">

      <!-- STATS -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
          <h3 class="text-lg font-semibold text-gray-800 mb-2">Utilizadores</h3>
          <p id="usersCount" class="text-3xl font-bold text-indigo-600">0</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
          <h3 class="text-lg font-semibold text-gray-800 mb-2">Tarefas</h3>
          <p id="tasksCount" class="text-3xl font-bold text-purple-600">0</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
          <h3 class="text-lg font-semibold text-gray-800 mb-2">Atividades Base</h3>
          <p id="activitiesCount" class="text-3xl font-bold text-emerald-600">4</p>
        </div>

      </div>

      <!-- USERS TABLE -->
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-10">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Utilizadores Registados</h2>

        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm">
            <thead>
              <tr class="border-b text-gray-500">
                <th class="py-3">Nome</th>
                <th class="py-3">Email</th>
                <th class="py-3">Role</th>
                <th class="py-3">Criado em</th>
              </tr>
            </thead>
            <tbody id="usersTable"></tbody>
          </table>
        </div>
      </div>

      <!-- ACTIVITIES -->
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Atividades da Aplicação</h2>

        <div id="activitiesList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
      </div>

    </div>

  </main>

  <script type="module">
    import { requireAuth } from "../assets/js/authGuard.js";
    import { logout } from "../assets/js/logout.js";
    import { API_URL } from "../assets/js/api.js";

    window.logout = logout;

    const user = await requireAuth();
    const token = localStorage.getItem("token");

    const accessDenied = document.getElementById("accessDenied");
    const adminContent = document.getElementById("adminContent");

    const wellbeingActivities = [
      {
        id: "diaphragmatic",
        title: "Respiração Diafragmática",
        category: "Respiração",
        duration: "5 min"
      },
      {
        id: "bodyscan",
        title: "Body Scan",
        category: "Relaxamento",
        duration: "10 min"
      },
      {
        id: "grounding",
        title: "Grounding 5-4-3-2-1",
        category: "Ansiedade",
        duration: "7 min"
      },
      {
        id: "stretching",
        title: "Alongamento Suave",
        category: "Corpo",
        duration: "12 min"
      }
    ];

    if (user.role !== "admin") {
      accessDenied.classList.remove("hidden");
    } else {
      adminContent.classList.remove("hidden");
      loadAdminData();
    }

    async function loadAdminData() {
      try {
        const response = await fetch(`${API_URL}/admin/overview`, {
          headers: {
            Authorization: `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error("Erro ao carregar dados de administração");
        }

        const data = await response.json();

        renderStats(data);
        renderUsers(data.users);
        renderActivities();

      } catch (error) {
        console.error(error);
        accessDenied.classList.remove("hidden");
        accessDenied.querySelector("p").textContent =
          "Não foi possível carregar os dados de administração.";
      }
    }

    function renderStats(data) {
      document.getElementById("usersCount").textContent = data.users.length;
      document.getElementById("tasksCount").textContent = data.tasks.length;
      document.getElementById("activitiesCount").textContent = wellbeingActivities.length;
    }

    function renderUsers(users) {
      const table = document.getElementById("usersTable");

      table.innerHTML = users
        .map((item) => `
          <tr class="border-b last:border-b-0">
            <td class="py-3 font-medium text-gray-800">${item.name}</td>
            <td class="py-3 text-gray-500">${item.email}</td>
            <td class="py-3">
              <span class="px-3 py-1 rounded-full text-xs font-medium ${
                item.role === "admin"
                  ? "bg-purple-100 text-purple-700"
                  : "bg-gray-100 text-gray-600"
              }">
                ${item.role || "user"}
              </span>
            </td>
            <td class="py-3 text-gray-500">
              ${item.createdAt ? new Date(item.createdAt).toLocaleDateString() : "—"}
            </td>
          </tr>
        `)
        .join("");
    }

    function renderActivities() {
      const container = document.getElementById("activitiesList");

      container.innerHTML = wellbeingActivities
        .map((activity) => `
          <div class="p-4 bg-gray-50 border border-gray-200 rounded-xl">
            <p class="font-semibold text-gray-800">${activity.title}</p>
            <p class="text-sm text-gray-500">${activity.category} · ${activity.duration}</p>
          </div>
        `)
        .join("");
    }
  </script>

</body>
</html>
