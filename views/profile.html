<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindEase — Profile</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    html { scroll-behavior: smooth; }
  </style>
</head>

<body class="min-h-screen bg-gray-50 flex overflow-y-auto">

  <aside class="w-24 bg-white border-r border-gray-200 flex flex-col items-center py-8 gap-7 fixed h-full">

    <!-- HOME -->
    <a href="./dashboard.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 sidebar-active flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-indigo-700 opacity-80 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path d="M3 9.5l9-7 9 7v10.5a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1V9.5z"/>
        </svg>
      </div>
    </a>

    <!-- TASKS -->
    <a href="./tasks.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-indigo-700 opacity-80 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
    </a>

    <!-- HEART -->
    <a href="./mood.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-indigo-700 opacity-80 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 000-7.8z"/>
        </svg>
      </div>
    </a>

    <!-- WELLNESS / ZEN ICON -->
    <a href="./wellbeing.html" class="group">
    <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        <svg xmlns="http://www.w3.org/2000/svg" 
            class="w-7 h-7 text-indigo-700 opacity-80 group-hover:opacity-100 transition" 
            fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path d="M12 22s8-4 8-10-8-10-8-10-8 4-8 10 8 10 8 10z"/>
        </svg>
    </div>
    </a>

  <!-- FOCUS ICON -->
  <a href="./focus.html" class="group">
    <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
      <svg xmlns="http://www.w3.org/2000/svg" 
          class="w-7 h-7 text-indigo-700 opacity-80 group-hover:opacity-100 transition" 
          fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <circle cx="12" cy="12" r="8"/>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
      </svg>
    </div>
  </a>

    <!-- LOGOUT -->
    <button onclick="logout()" class="group mt-auto mb-4">
      <div class="w-14 h-14 rounded-2xl bg-purple-300 flex items-center justify-center shadow-sm hover:bg-purple-400 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-purple-800 opacity-80 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <path d="M16 17l5-5-5-5"/>
          <path d="M21 12H9"/>
        </svg>
      </div>
    </button>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 ml-24 p-10">

    <!-- HEADER -->
    <div class="mb-10">
      <h1 class="text-3xl font-bold text-gray-900">Profile</h1>
      <p class="text-gray-500 text-sm">Track your progress and goals</p>
    </div>

    <!-- GRID -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">

        <!-- PROFILE CARD -->
        <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm flex flex-col items-center text-center">

        <!-- Avatar -->
        <label for="photoInput" class="cursor-pointer flex flex-col items-center">
            <img id="profilePhoto" 
                src="" 
                class="w-24 h-24 rounded-full object-cover shadow mb-3 hidden">

            <div id="profileAvatar"
                class="w-24 h-24 rounded-full bg-indigo-200 flex items-center justify-center text-4xl font-bold text-indigo-700 mb-3">
            U
            </div>

            <p class="text-xs text-indigo-600 underline cursor-pointer">Change photo</p>
        </label>

        <input id="photoInput" type="file" accept="image/*" class="hidden">

        <h2 id="profileName" class="text-xl font-semibold text-gray-800 mt-2"></h2>
        <p id="profileEmail" class="text-gray-500 text-sm mb-4"></p>

        <button id="openEdit" class="px-4 py-2 bg-indigo-500 text-white rounded-xl hover:bg-indigo-600 transition shadow">
            Edit Profile
        </button>
        </div>


      <!-- GENERAL STATS -->
      <div class="lg:col-span-2 bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
        <h2 class="text-xl font-semibold text-gray-800 mb-6">General Statistics</h2>

        <div class="grid grid-cols-2 gap-6">

          <div class="p-6 bg-indigo-50 rounded-2xl text-center shadow-sm">
            <p class="text-3xl font-bold text-indigo-700" id="avgMood">0</p>
            <p class="text-sm text-indigo-500 mt-1">Average Mood</p>
          </div>

          <div class="p-6 bg-purple-50 rounded-2xl text-center shadow-sm">
            <p class="text-3xl font-bold text-purple-700" id="streakDays">0</p>
            <p class="text-sm text-purple-500 mt-1">Consecutive Days</p>
          </div>

          <div class="p-6 bg-pink-50 rounded-2xl text-center shadow-sm">
            <p class="text-3xl font-bold text-pink-700" id="tasksCompleted">0</p>
            <p class="text-sm text-pink-500 mt-1">Completed Tasks</p>
          </div>

          <div class="p-6 bg-blue-50 rounded-2xl text-center shadow-sm">
            <p class="text-3xl font-bold text-blue-700" id="activities">0</p>
            <p class="text-sm text-blue-500 mt-1">Activities</p>
          </div>

        </div>
      </div>

    </div>

    <!-- PREFERENCES -->
    <div class="mt-10 bg-white border border-gray-200 rounded-2xl p-6 shadow-sm max-w-5xl w-full">

      <h2 class="text-xl font-semibold text-gray-800 mb-6">Preferences</h2>

      <div class="space-y-5">

        <!-- NOTIFICATIONS -->
        <div class="flex items-center justify-between p-4 border border-gray-200 rounded-xl hover:bg-gray-50 transition">
          <div>
            <p class="font-medium text-gray-800">Daily notifications</p>
            <p class="text-sm text-gray-500">Receive reminders to stay on track</p>
          </div>

          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" class="sr-only peer">
            <div class="w-11 h-6 bg-gray-300 peer-focus:ring-2 peer-focus:ring-indigo-300 rounded-full peer peer-checked:bg-indigo-500 transition"></div>
            <span class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full peer-checked:translate-x-5 transition"></span>
          </label>
        </div>

        <!-- BREAK REMINDERS -->
        <div class="flex items-center justify-between p-4 border border-gray-200 rounded-xl hover:bg-gray-50 transition">
          <div>
            <p class="font-medium text-gray-800">Break reminders</p>
            <p class="text-sm text-gray-500">Suggestions to rest throughout the day</p>
          </div>

          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" class="sr-only peer">
            <div class="w-11 h-6 bg-gray-300 peer-focus:ring-2 peer-focus:ring-indigo-300 rounded-full peer peer-checked:bg-indigo-500 transition"></div>
            <span class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full peer-checked:translate-x-5 transition"></span>
          </label>
        </div>

      </div>

    </div>

  </main>

  <!-- EDIT PROFILE MODAL -->
  <div id="editModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center hidden z-50">
    <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-xl">

      <h2 class="text-xl font-semibold text-gray-800 mb-4">Edit Profile</h2>

      <div class="space-y-4">

        <div>
          <label class="text-sm text-gray-600">Name</label>
          <input id="editName" type="text" class="w-full mt-1 p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
        </div>

        <div>
          <label class="text-sm text-gray-600">Email</label>
          <input id="editEmail" type="email" class="w-full mt-1 p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
        </div>

      </div>

      <div class="flex justify-end gap-3 mt-6">
        <button id="cancelEdit" class="px-4 py-2 rounded-xl bg-gray-200 hover:bg-gray-300 transition">Cancel</button>
        <button id="saveEdit" class="px-4 py-2 rounded-xl bg-indigo-500 text-white hover:bg-indigo-600 transition">Save</button>
      </div>

    </div>
  </div>

<script type="module">
  import { requireAuth } from "../assets/js/authGuard.js";
  import { apiPut } from "../assets/js/api.js";
  import { logoutUser } from "../assets/js/auth.js";

const API_URL = "http://localhost:4000";

async function loadUserStats() {
  try {
    const token = localStorage.getItem("token");

    const res = await fetch(`${API_URL}/auth/me`, {
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    if (!res.ok) throw new Error("Failed to fetch user stats");

    const data = await res.json();
    setText("avgMood", data.avgMood || 0);
    setText("streakDays", data.streak || 0);
    setText("tasksCompleted", data.tasks || 0);
    setText("activities", data.activities || 0);

  } catch (err) {
    console.error("Failed to load stats:", err);
  }
}

  function setText(id, value) {
    const el = document.getElementById(id);
    if (!el) {
      console.warn("Missing element:", id);
      return;
    }
    el.textContent = value;
  }

  loadUserStats();

  // Logout global
  window.logout = () => {
    logoutUser();
    window.location.href = "../index.html";
  };


  // 1) Obter utilizador real
  const user = await requireAuth();
  const token = localStorage.getItem("token");

  // 2) Preencher UI com dados reais
  const nameEl = document.getElementById("profileName");
  const emailEl = document.getElementById("profileEmail");
  const avatarFallback = document.getElementById("profileAvatar");
  const photoImg = document.getElementById("profilePhoto");

  nameEl.textContent = user.name;
  emailEl.textContent = user.email;

  if (user.photo) {
    photoImg.src = user.photo;
    photoImg.classList.remove("hidden");
    avatarFallback.classList.add("hidden");
  } else {
    avatarFallback.textContent = user.name.charAt(0).toUpperCase();
    avatarFallback.classList.remove("hidden");
    photoImg.classList.add("hidden");
  }

  // 3) Abrir modal com dados reais
  const modal = document.getElementById("editModal");
  const openBtn = document.getElementById("openEdit");
  const cancelBtn = document.getElementById("cancelEdit");
  const saveBtn = document.getElementById("saveEdit");

  openBtn.onclick = () => {
    document.getElementById("editName").value = user.name;
    document.getElementById("editEmail").value = user.email;
    modal.classList.remove("hidden");
  };

  cancelBtn.onclick = () => modal.classList.add("hidden");

  // 4) Guardar alterações (PUT /auth/update)
  saveBtn.onclick = async () => {
    const newName = document.getElementById("editName").value.trim();
    const newEmail = document.getElementById("editEmail").value.trim();

    if (newName.length < 2) return alert("Nome demasiado curto");

    const updated = {
      name: newName,
      email: newEmail,
      photo: user.photo
    };

    const newUser = await apiPut("/auth/update", updated, token);

    localStorage.setItem("currentUser", JSON.stringify(newUser));

    location.reload();
  };

  // Fechar modal ao clicar fora
  modal.onclick = e => {
    if (e.target === modal) modal.classList.add("hidden");
  };

  // 5) Upload de foto real (PUT /auth/update)
  document.getElementById("photoInput").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async event => {
      const updated = {
        name: user.name,
        email: user.email,
        photo: event.target.result
      };

      const newUser = await apiPut("/auth/update", updated, token);

      localStorage.setItem("currentUser", JSON.stringify(newUser));

      location.reload();
    };

    reader.readAsDataURL(file);
  });


</script>

</body>
</html>
