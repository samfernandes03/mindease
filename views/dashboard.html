<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindEase — Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    html { scroll-behavior: smooth; }
  </style>
</head>

<body class="min-h-screen bg-gray-50 flex overflow-y-auto">

  <!-- SIDEBAR -->
  <aside class="w-24 bg-white border-r border-gray-200 flex flex-col items-center py-8 gap-7 fixed h-full">

    <!-- HOME -->
    <a href="./dashboard.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 sidebar-active flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-indigo-700 opacity-80 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path d="M3 9.5l9-7 9 7v10.5a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1V9.5z"/>
        </svg>
      </div>
    </a>

    <!-- TASKS -->
    <a href="./tasks.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-indigo-700 opacity-80 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
    </a>

    <!-- HEART -->
    <a href="./mood.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-indigo-700 opacity-80 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 000-7.8z"/>
        </svg>
      </div>
    </a>

    <!-- WELLBEING -->
    <a href="./wellbeing.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-indigo-700 opacity-80 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path d="M12 22s8-4 8-10-8-10-8-10-8 4-8 10 8 10 8 10z"/>
        </svg>
      </div>
    </a>

    <!-- FOCUS -->
    <a href="./focus.html" class="group">
      <div class="w-14 h-14 rounded-2xl bg-indigo-200 flex items-center justify-center shadow-sm hover:bg-indigo-300 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-indigo-700 opacity-80 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <circle cx="12" cy="12" r="8"/>
          <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
        </svg>
      </div>
    </a>

    <!-- LOGOUT -->
    <button onclick="logout()" class="group mt-auto mb-4">
      <div class="w-14 h-14 rounded-2xl bg-purple-300 flex items-center justify-center shadow-sm hover:bg-purple-400 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-purple-800 opacity-80 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <path d="M16 17l5-5-5-5"/>
          <path d="M21 12H9"/>
        </svg>
      </div>
    </button>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 ml-24 p-10">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-10">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Welcome back</h1>
        <p class="text-gray-500 text-sm" id="dashboardDate"></p>
      </div>

      <a href="./profile.html" class="relative">
        <img id="navProfilePhoto"
             class="w-12 h-12 rounded-full shadow cursor-pointer hover:opacity-80 transition hidden"
             alt="Profile">

        <div id="navProfileFallback"
             class="w-12 h-12 rounded-full bg-indigo-200 flex items-center justify-center 
                    text-lg font-bold text-indigo-700 shadow cursor-pointer hover:opacity-80 transition">
          U
        </div>
      </a>
    </div>

    <!-- GRID -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">

      <!-- MOOD CHART -->
      <div class="lg:col-span-2 bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Mood this week</h2>
        <canvas id="moodChart" height="120"></canvas>
      </div>

      <!-- WELL-BEING SUGGESTIONS -->
      <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Well-being Suggestions</h2>

        <div class="space-y-4">
          <div class="p-4 bg-indigo-50 rounded-xl">
            <p class="font-medium text-indigo-700">5-minute breathing</p>
            <p class="text-sm text-indigo-500">Relax and reset your mind</p>
          </div>

          <div class="p-4 bg-purple-50 rounded-xl">
            <p class="font-medium text-purple-700">Gentle stretching</p>
            <p class="text-sm text-purple-500">10 minutes of light movement</p>
          </div>
        </div>
      </div>

    </div>

    <!-- TASK OVERVIEW CARDS -->
    <div id="taskStats" class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-10">

      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
        <h3 class="text-lg font-semibold text-gray-800 mb-2">Tasks Today</h3>
        <p id="tasksTodayCount" class="text-3xl font-bold text-indigo-600">0</p>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
        <h3 class="text-lg font-semibold text-gray-800 mb-2">Overdue</h3>
        <p id="tasksOverdueCount" class="text-3xl font-bold text-red-500">0</p>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
        <h3 class="text-lg font-semibold text-gray-800 mb-2">Upcoming</h3>
        <p id="tasksUpcomingCount" class="text-3xl font-bold text-yellow-500">0</p>
      </div>

    </div>

    <!-- PROGRESS BAR -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mt-10">
      <h3 class="text-lg font-semibold text-gray-800 mb-4">Task Progress</h3>

      <div class="w-full bg-gray-200 rounded-full h-4">
        <div id="taskProgressBar" class="bg-indigo-500 h-4 rounded-full" style="width: 0%"></div>
      </div>

      <p id="taskProgressText" class="mt-2 text-sm text-gray-600">0% completed</p>
    </div>

    <!-- NEXT TASKS -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mt-10">
      <h3 class="text-xl font-semibold text-gray-800 mb-4">Next Tasks</h3>

      <div id="nextTasksList" class="space-y-4"></div>
    </div>

        <!-- FAVORITE ACTIVITIES -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mt-10">
      <h3 class="text-xl font-semibold text-gray-800 mb-4">Atividades Favoritas</h3>

      <div id="favoriteActivitiesList" class="space-y-4">
        <p class="text-gray-500 text-sm">Ainda não tens atividades favoritas.</p>
      </div>
    </div>

  </main>


<script type="module">
  import { requireAuth } from "../assets/js/authGuard.js";
  import { logout } from "../assets/js/logout.js";
  import { apiGetAuth } from "../assets/js/api.js";
  import { loadFavorites } from "../assets/js/favoritesService.js";

  window.logout = logout;

    function normalizeDate(date) {
      return new Date(date).toISOString().split("T")[0];
  }

  const wellbeingActivities = [
  {
    id: "diaphragmatic",
    title: "Respiração Diafragmática",
    description: "Exercício de respiração para reduzir ansiedade."
  },
  {
    id: "bodyscan",
    title: "Body Scan",
    description: "Exercício de atenção ao corpo e relaxamento."
  },
  {
    id: "grounding",
    title: "Grounding 5-4-3-2-1",
    description: "Técnica para recuperar foco no momento presente."
  },
  {
    id: "stretching",
    title: "Alongamento Suave",
    description: "Movimentos leves para aliviar tensão física."
  }
];

function renderFavoriteActivities() {
  const favorites = loadFavorites(user.id);
  const container = document.getElementById("favoriteActivitiesList");

  if (!container) return;

  if (favorites.length === 0) {
    container.innerHTML = `
      <p class="text-gray-500 text-sm">Ainda não tens atividades favoritas.</p>
    `;
    return;
  }

  const favoriteActivities = wellbeingActivities.filter((activity) =>
    favorites.includes(activity.id)
  );

  if (favoriteActivities.length === 0) {
    container.innerHTML = `
      <p class="text-gray-500 text-sm">Ainda não tens atividades favoritas.</p>
    `;
    return;
  }

  container.innerHTML = favoriteActivities
    .map((activity) => `
      <div class="p-4 bg-purple-50 border border-purple-100 rounded-xl flex justify-between items-center">
        <div>
          <p class="font-medium text-purple-700">${activity.title}</p>
          <p class="text-sm text-purple-500">${activity.description}</p>
        </div>

        <a href="./wellbeing.html" class="text-sm font-medium text-purple-700 hover:underline">
          Abrir
        </a>
      </div>
    `)
    .join("");
}


  /* -----------------------------------------
     1) USER AUTH + PROFILE
  ----------------------------------------- */
  const user = await requireAuth();

  // Atualizar nome
  document.querySelector("h1").textContent = `Welcome back, ${user.name}`;

  // Foto dinâmica
  const navPhoto = document.getElementById("navProfilePhoto");
  const navFallback = document.getElementById("navProfileFallback");

  if (user.photo) {
    navPhoto.src = user.photo;
    navPhoto.classList.remove("hidden");
    navFallback.classList.add("hidden");
  } else {
    navFallback.textContent = user.name.charAt(0).toUpperCase();
    navFallback.classList.remove("hidden");
    navPhoto.classList.add("hidden");
  }

  /* -----------------------------------------
     2) DATA ATUAL
  ----------------------------------------- */
  const dateEl = document.getElementById("dashboardDate");
  const today = new Date();
  dateEl.textContent = today.toLocaleDateString("en-US", {
    weekday: "long",
    month: "long",
    day: "numeric",
    year: "numeric"
  });

  /* -----------------------------------------
     3) LOAD TASKS FROM BACKEND
  ----------------------------------------- */
  const token = localStorage.getItem("token");
  let tasks = [];

  async function loadTasks() {
    tasks = await apiGetAuth("/tasks", token);
    updateStats();
    updateProgress();
    updateNextTasks();
  }

  /* -----------------------------------------
     4) TASK STATS (Today / Overdue / Upcoming)
  ----------------------------------------- */
  function updateStats() {
    const todayStr = normalizeDate(new Date());

    const todayTasks = tasks.filter(t =>
      normalizeDate(t.dueDate) === todayStr
    );

    const overdueTasks = tasks.filter(t =>
      normalizeDate(t.dueDate) < todayStr && t.status !== "Done"
    );

    const upcomingTasks = tasks.filter(t => {
      const diff =
        (new Date(t.dueDate) - new Date(todayStr)) /
        (1000 * 60 * 60 * 24);

      return diff > 0 && diff <= 7;
    });

    document.getElementById("tasksTodayCount").textContent = todayTasks.length;
    document.getElementById("tasksOverdueCount").textContent = overdueTasks.length;
    document.getElementById("tasksUpcomingCount").textContent = upcomingTasks.length;
  }
  /* -----------------------------------------
     5) PROGRESS BAR
  ----------------------------------------- */
  function updateProgress() {
    const done = tasks.filter(t => t.status === "Done").length;
    const total = tasks.length;

    const percent = total === 0 ? 0 : Math.round((done / total) * 100);

    document.getElementById("taskProgressBar").style.width = percent + "%";
    document.getElementById("taskProgressText").textContent = `${percent}% completed`;
  }

  /* -----------------------------------------
     6) NEXT TASKS LIST
  ----------------------------------------- */
  function updateNextTasks() {
    const upcoming = tasks
      .filter(t => new Date(t.dueDate) >= today)
      .sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate))
      .slice(0, 5);

    const container = document.getElementById("nextTasksList");

    if (upcoming.length === 0) {
      container.innerHTML = `<p class="text-gray-500 text-sm">No upcoming tasks</p>`;
      return;
    }

    container.innerHTML = upcoming.map(t => `
      <div class="p-4 bg-gray-50 border border-gray-200 rounded-xl flex justify-between">
        <div>
          <p class="font-medium text-gray-800">${t.title}</p>
          <p class="text-sm text-gray-500">${t.dueDate}</p>
        </div>
        <span class="text-sm px-3 py-1 rounded-full 
          ${t.status === "Done" ? "bg-green-200 text-green-700" : "bg-yellow-200 text-yellow-700"}">
          ${t.status}
        </span>
      </div>
    `).join("");
  }

  /* -----------------------------------------
     7) MOOD CHART
  ----------------------------------------- */
 let moodChart;

async function loadMoodChart() {
  const data = await apiGetAuth("/moods/chart", token);

  const labels = data.map(d => d.day);
  const values = data.map(d => d.avg);


  const ctx = document.getElementById('moodChart').getContext('2d');

  if (moodChart) moodChart.destroy(); // evita duplicação

  moodChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Mood',
        data: values,
        borderColor: '#6366F1',
        backgroundColor: 'rgba(99, 102, 241, 0.2)',
        borderWidth: 3,
        tension: 0.4,
        fill: true,
        pointRadius: 5,
        pointBackgroundColor: '#6366F1'
      }]
    },
    options: {
      scales: {
        y: { min: 1, max: 10 }
      }
    }
  });
}

function safeSet(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value;
}

async function loadMoodStats() {
  const stats = await apiGetAuth("/moods/stats", token);

  safeSet("avgMood", `${stats.average} / 10`);
  safeSet("bestDay", stats.bestDay || "—");
  safeSet("correlation", stats.correlation ?? 0);
}

window.addEventListener("focus", async () => {
  const flag = localStorage.getItem("tasksUpdated");

  if (flag === "true") {
    localStorage.removeItem("tasksUpdated");

    // só atualiza se necessário
    await loadTasks();
  }
});


  await loadTasks();
  await loadMoodChart();
  await loadMoodStats();
  renderFavoriteActivities();
</script>


</body>
</html>
