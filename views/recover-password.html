<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindEase — Recover Password</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="../assets/css/background.css">
  <link rel="stylesheet" href="../assets/css/toasts.css">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    emailjs.init("DNqHaI0rPIM0beX0P");
  </script>
</head>

<body class="relative min-h-screen bg-white flex justify-center items-center overflow-hidden">

  <div class="sphere sphere-1"></div>
  <div class="sphere sphere-2"></div>

  <div class="toast-container"></div>

  <div class="w-full max-w-sm px-4">

    <h1 class="text-3xl font-bold text-center text-gray-900 mb-2">MindEase</h1>
    <p class="text-[10px] text-center text-gray-500 tracking-[0.25em] mb-8">RECOVER PASSWORD</p>

    <form id="recoverForm" class="space-y-5">

      <!-- EMAIL -->
      <div>
        <label class="block text-gray-700 mb-1 text-sm font-medium">Email</label>

        <div class="relative">
          <input 
            type="email" 
            id="email"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 pr-10 text-sm focus:ring-2 focus:ring-indigo-400 bg-white"
            required
          >

          <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-gray-400">
            <!-- HEROICON: Envelope -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25H4.5a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5H4.5a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.5a2.25 2.25 0 01-2.31 0l-7.5-4.5A2.25 2.25 0 012.25 6.993V6.75" />
            </svg>
          </div>
        </div>
      </div>

      <button 
        class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">
        Send Reset Link
      </button>

      <button 
        onclick="window.location.href='login.html'"
        type="button"
        class="w-full bg-purple-100 text-purple-700 py-2 rounded-lg text-sm font-semibold hover:bg-purple-200 transition">
        Back to Login
      </button>

    </form>
  </div>

  <script type="module">
    import { showToast } from "../assets/js/toasts.js";

    // Generate secure token
    function generateToken() {
      return crypto.randomUUID();
    }

    document.getElementById("recoverForm").addEventListener("submit", async e => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();

      if (!email)
        return showToast("Please enter your email.", "error");

      if (!email.includes("@"))
        return showToast("Invalid email address.", "error");

      // 1. Generate token
      const token = generateToken();

      // 2. Save token with expiration (1 hour)
      const resetData = {
        email,
        token,
        expires: Date.now() + 3600 * 1000
      };

      localStorage.setItem("reset_token_" + token, JSON.stringify(resetData));

      // 3. Create reset link (correct folder)
      const resetLink = `${window.location.origin}/views/reset-password.html?token=${token}`;

      // 4. Send email via EmailJS
      try {
        await emailjs.send("service_qe41mzq", "template_gkns57x", {
          email: email,
          link: resetLink
        });

        showToast("Reset link sent to your email.", "success");

        setTimeout(() => window.location.href = "email-sent.html", 1200);

      } catch (err) {
        console.error(err);
        showToast("Error sending email. Try again later.", "error");
      }
    });
  </script>

</body>
</html>
