<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindEase — Register</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="../assets/css/background.css">
  <link rel="stylesheet" href="../assets/css/toasts.css">
</head>

<body class="relative min-h-screen bg-white flex justify-center items-center overflow-hidden">

  <div class="sphere sphere-1"></div>
  <div class="sphere sphere-2"></div>

  <div class="toast-container"></div>

  <div class="w-full max-w-sm px-4">

    <h1 class="text-3xl font-bold text-center text-gray-900 mb-2">MindEase</h1>
    <p class="text-[10px] text-center text-gray-500 tracking-[0.25em] mb-8">CREATE ACCOUNT</p>

    <form id="registerForm" class="space-y-5">

      <!-- NAME -->
      <div>
        <label class="block text-gray-700 mb-1 text-sm font-medium">Full Name</label>
        <input type="text" id="name"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-400 bg-white"
          required>
      </div>

      <!-- EMAIL -->
      <div>
        <label class="block text-gray-700 mb-1 text-sm font-medium">Email</label>
        <input type="email" id="email"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-400 bg-white"
          required>
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block text-gray-700 mb-1 text-sm font-medium">Password</label>

        <div class="relative">
          <input type="password" id="password"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 pr-10 text-sm focus:ring-2 focus:ring-indigo-400 bg-white"
            required>

          <button type="button"
            class="absolute inset-y-0 right-3 flex items-center text-gray-500 hover:text-gray-700"
            onclick="togglePassword('password', this)">
            
            <!-- HEROICON: Eye -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>

          </button>
        </div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div>
        <label class="block text-gray-700 mb-1 text-sm font-medium">Confirm Password</label>

        <div class="relative">
          <input type="password" id="confirmPassword"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 pr-10 text-sm focus:ring-2 focus:ring-indigo-400 bg-white"
            required>

          <button type="button"
            class="absolute inset-y-0 right-3 flex items-center text-gray-500 hover:text-gray-700"
            onclick="togglePassword('confirmPassword', this)">
            
            <!-- HEROICON: Eye -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>

          </button>
        </div>
      </div>

      <button class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">
        Create Account
      </button>

      <button onclick="window.location.href='login.html'" type="button"
        class="w-full bg-purple-100 text-purple-700 py-2 rounded-lg text-sm font-semibold hover:bg-purple-200 transition">
        Back to Login
      </button>

    </form>
  </div>

<script type="module">
  import { apiPost } from "../assets/js/api.js";
  import { showToast } from "../assets/js/toasts.js";

  document.getElementById("registerForm").addEventListener("submit", async e => {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    if (!name || !email || !password || !confirmPassword)
      return showToast("Please fill in all fields.", "error");

    if (!email.includes("@"))
      return showToast("Invalid email address.", "error");

    if (password.length < 6)
      return showToast("Password must be at least 6 characters.", "error");

    if (password !== confirmPassword)
      return showToast("Passwords do not match.", "error");

    try {
      await apiPost("/auth/register", { name, email, password });

      showToast("Account created successfully!", "success");

      setTimeout(() => window.location.href = "login.html", 900);

    } catch (err) {
      showToast(err.message, "error");
    }
  });
</script>

</body>
</html>
